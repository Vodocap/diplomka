[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

# Playwright settings
# Minimal default - specific runs add --headed or --browser as needed
addopts = -v

# For headed mode: add --headed --browser chromium to command line
# For headless mode: add --browser chromium to command line
