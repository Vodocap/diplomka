name: Build and deploy to GitHub Pages

permissions:
  contents: write
  pages: write

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust and add wasm target
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          source $HOME/.cargo/env

      - name: Build WebAssembly with wasm-pack
        run: |
          ls -la
          wasm-pack build --release --target web --out-dir pkg

      - name: Ensure pkg files are committed into repository (optional)
        if: always()
        run: |
          # Optionally copy pkg into a committed folder so deploy action sees it
          # This is only needed if you prefer committed artifacts; otherwise deploy uses build output.
          mkdir -p committed_build
          rm -rf committed_build/pkg || true
          if [ -d pkg ]; then cp -r pkg committed_build/; fi
          cp index.html committed_build/ || true
          echo "Committed build staged in committed_build/ (not auto-committed)"

      - name: Show publishable files (diagnostic)
        run: |
          echo "-- root listing --"
          ls -la
          echo "-- pkg listing --"
          if [ -d pkg ]; then ls -la pkg; else echo "pkg missing"; fi
          echo "-- check wasm.js --"
          if [ -f pkg/wasm.js ]; then head -n 5 pkg/wasm.js || true; file --mime-type pkg/wasm.js || true; else echo "pkg/wasm.js missing"; fi
          echo "-- check wasm_bg.wasm --"
          if [ -f pkg/wasm_bg.wasm ]; then file --mime-type pkg/wasm_bg.wasm || true; else echo "pkg/wasm_bg.wasm missing"; fi

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir -p deploy
          # copy all frontend assets
          cp index.html deploy/
          cp -r css deploy/
          cp -r js deploy/
          [ -d components ] && cp -r components deploy/ || true
          [ -f test_data_with_nulls.csv ] && cp test_data_with_nulls.csv deploy/ || true
          if [ -d pkg ]; then 
            cp -r pkg deploy/
            rm -f deploy/pkg/.gitignore
          fi
          # ensure nojekyll so GitHub Pages serves files as-is
          touch deploy/.nojekyll
          # Add _headers file for proper MIME types (Netlify/Cloudflare)
          cat > deploy/_headers << 'EOF'
          /pkg/*.wasm
            Content-Type: application/wasm
          /pkg/*.js
            Content-Type: application/javascript
          EOF
          # Verify structure
          echo "=== Deploy directory structure ==="
          ls -laR deploy/
          echo "=== Checking wasm.js import path ==="
          grep -n "import.*pkg.*wasm" deploy/index.html || echo "No import found"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: gh-pages
          clean: true

  playwright-tests:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust and add wasm target
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          source $HOME/.cargo/env

      - name: Build WebAssembly
        run: wasm-pack build --release --target web --out-dir pkg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: |
          pip install -r requirements-test.txt
          playwright install chromium --with-deps

      - name: Start server and run Playwright tests
        run: |
          # Start server in background
          bash serve.sh &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3333 > /dev/null 2>&1; then
              echo "Server ready on port 3333"
              break
            fi
            sleep 1
          done

          # Run tests
          mkdir -p tests/reports tests/output
          python3 -m pytest tests/ \
            --browser chromium \
            -v \
            --timeout 180 \
            --html=tests/reports/test_report.html --self-contained-html \
            --tb=short \
            2>&1 | tee tests/output/test_output.log

          TEST_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $TEST_EXIT

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-report
          path: |
            tests/reports/
            tests/output/
            tests/test_report.log
          retention-days: 14
